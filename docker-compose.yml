services:
  guitar-bazaar:
    build:
      context: .
    container_name: guitar-bazaar
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
